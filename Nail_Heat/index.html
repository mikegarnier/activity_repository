<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nail Heating Simulation</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; position: relative; }
        .container { max-width: 600px; margin: auto; background: #f4f4f4; padding: 20px; border-radius: 8px; position: relative; }
        .wood-block { width: 100px; height: 60px; background: sandybrown; margin: 140px auto 0; position: relative; }
        .nail { width: 5px; height: 45px; background: gray; position: absolute; left: 50%; bottom: 60px; transform: translateX(-50%); }
        .hammer { width: 25px; height: 60px; background: black; position: absolute; left: 50%; top: 160px; transform: translateX(-50%); display: block; }
        .hammer-handle { width: 65px; height: 20px; background: brown; position: absolute; left: 25px; top: 17.5px; }
        .temperature { font-size: 20px; margin-top: 20px; }
        .label { position: absolute; left: 100px; font-size: 16px; font-weight: bold; text-align: right; width: 100px; }
        .label-line { position: absolute; width: 20px; height: 2px; background: black; left: 210px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Does driving the nail into the wood faster make the nail heat up more?</h2>
        <label for="driveTime">Select Time to Drive Nail (seconds):</label>
        <select id="driveTime">
            <option value="5">5 seconds</option>
            <option value="4">4 seconds</option>
            <option value="3">3 seconds</option>
            <option value="2">2 seconds</option>
        </select>
        
        <button onclick="startSimulation()">Start Nailing</button>
        
        <div class="label" style="top: 175px; color: black;">Hammer</div>
        <div class="label-line" style="top: 185px;"></div>
        
        <div class="hammer" id="hammer">
            <div class="hammer-handle"></div>
        </div>
        
        <div class="label" style="top: 245px; color: gray;">Nail</div>
        <div class="label-line" style="top: 255px;"></div>
        
        <div class="wood-block">
            <div class="nail" id="nail"></div>
        </div>
        
        <div class="label" style="top: 300px; color: sandybrown;">Wood Block</div>
        <div class="label-line" style="top: 310px;"></div>
        
        <div class="temperature">
            Starting Temperature: <span id="startTemperature">68</span>°F<br>
            Final Temperature: <span id="finalTemperature"></span>°F
        </div>
    </div>

    <script>
        function startSimulation() {
            let driveTime = parseInt(document.getElementById('driveTime').value);
            let nail = document.getElementById('nail');
            let hammer = document.getElementById('hammer');
            let startTemperatureDisplay = document.getElementById('startTemperature');
            let finalTemperatureDisplay = document.getElementById('finalTemperature');
            
            let startTempC = 20; // Starting temp in Celsius
            let finalTempC = Math.floor(Math.random() * 10) + 20; // Random temp between 20 and 30°C
            
            // Convert to Fahrenheit
            let startTempF = Math.round(startTempC * 9/5 + 32);
            let finalTempF = Math.round(finalTempC * 9/5 + 32);
            
            startTemperatureDisplay.innerText = startTempF;
            finalTemperatureDisplay.innerText = ""; // Keep final temperature blank initially
            
            nail.style.height = '45px';
            nail.style.bottom = '45px';
            hammer.style.top = '150px';
            hammer.style.display = 'block';
            
            let steps = 10;
            let stepDuration = driveTime / steps * 1000;
            let step = 0;
            let hammerStartPos = 180;
            
            let interval = setInterval(() => {
                if (step < steps) {
                    nail.style.bottom = (45 - step * 4) + 'px';
                    hammer.style.top = (step % 2 === 0 ? (hammerStartPos + step) + 'px' : (hammerStartPos + step - 10) + 'px');
                    hammerStartPos += 4.5; // Gradually lowers hammer with each swing
                    step++;
                } else {
                    clearInterval(interval);
                    finalTemperatureDisplay.innerText = finalTempF; // Update final temperature only after nailing is complete
                    hammer.style.display = 'block';
                }
            }, stepDuration);
        }
    </script>
</body>
</html>
